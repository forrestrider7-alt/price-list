<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F1EEE8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Photography Price List</title>
<style>
:root {
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --cream: #f1eee8;
  --sand: #e5dfd3;
  --ash-sage: #cad0c5;
  --muted-slate: #8d9497;
  --paper: #f7f4ef;
  --graphite: #1e2224;
  --graphite-soft: #4f565a;
  --light-shadow: rgba(255, 255, 255, 0.85);
  --dark-shadow: rgba(120, 128, 132, 0.28);
}

*,
*::before,
*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  color: var(--graphite);
  background:
    radial-gradient(110% 90% at 0% 0%, rgba(255,255,255,0.65) 0%, transparent 55%),
    radial-gradient(130% 100% at 100% 100%, rgba(202,208,197,0.55) 0%, transparent 58%),
    var(--cream);
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  -webkit-font-smoothing: antialiased;
}

.app {
  width: min(460px, 100%);
  height: 100%;
  max-height: 100dvh;
  padding: calc(var(--safe-t) + 14px) 14px calc(var(--safe-b) + 14px);
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  gap: 12px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.brand-tag {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted-slate);
}

.brand-title {
  font-size: 18px;
  font-weight: 650;
  letter-spacing: -0.02em;
}

.lang-toggle {
  display: inline-flex;
  padding: 4px;
  border-radius: 999px;
  background: var(--paper);
  box-shadow: -5px -5px 10px var(--light-shadow), 5px 5px 12px var(--dark-shadow);
}

.lang-btn {
  border: 0;
  background: transparent;
  color: var(--graphite-soft);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 999px;
  padding: 8px 11px;
  min-width: 40px;
  transition: 220ms ease;
}

.lang-btn.active {
  color: var(--graphite);
  background: linear-gradient(145deg, #fdfbf8, #ebe5db);
  box-shadow: inset -2px -2px 4px rgba(255,255,255,0.95), inset 2px 2px 5px rgba(140, 147, 152, 0.34);
}

.viewport {
  overflow: hidden;
  border-radius: 30px;
  touch-action: pan-y;
  background: rgba(247, 244, 239, 0.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: -8px -8px 16px var(--light-shadow), 9px 9px 18px var(--dark-shadow);
}

.track {
  height: 100%;
  display: flex;
  transition: transform 420ms cubic-bezier(0.22, 0.78, 0.2, 1);
  will-change: transform;
}

.card {
  min-width: 100%;
  height: 100%;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.head-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}

.tier {
  font-size: 10px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted-slate);
  margin-bottom: 5px;
}

.name {
  font-size: 31px;
  line-height: 0.98;
  letter-spacing: -0.04em;
  font-weight: 680;
}

.featured-chip {
  border-radius: 999px;
  font-size: 10px;
  padding: 8px 10px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: #5a605d;
  background: linear-gradient(145deg, #dbe2d7, #c2c9be);
  box-shadow: inset -2px -2px 3px rgba(255,255,255,0.65), inset 2px 2px 4px rgba(121,128,124,0.28);
}

.slogan {
  color: var(--graphite-soft);
  font-size: 14px;
  line-height: 1.45;
}

.price-block {
  border-radius: 18px;
  padding: 15px 14px;
  background: linear-gradient(165deg, rgba(255,255,255,0.86), rgba(237,232,225,0.66));
  box-shadow: inset -3px -3px 5px rgba(255,255,255,0.9), inset 3px 3px 6px rgba(145,152,157,0.24);
}

.price {
  font-size: 34px;
  letter-spacing: -0.04em;
  font-weight: 710;
}

.note {
  margin-top: 4px;
  color: var(--muted-slate);
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.pill {
  font-size: 12px;
  color: var(--graphite-soft);
  border-radius: 999px;
  padding: 8px 11px;
  background: var(--paper);
  box-shadow: -3px -3px 6px rgba(255,255,255,0.95), 3px 3px 7px rgba(138,145,150,0.24);
}

.features {
  list-style: none;
  display: grid;
  gap: 8px;
  padding-top: 4px;
}

.features li {
  font-size: 13px;
  line-height: 1.35;
  color: var(--graphite-soft);
  display: flex;
  gap: 8px;
}

.features li::before {
  content: "・";
  color: #687071;
  flex-shrink: 0;
}

.book-btn {
  margin-top: auto;
  width: 100%;
  border: 0;
  border-radius: 16px;
  padding: 14px 16px;
  background: linear-gradient(145deg, #2b3032, #15191b);
  color: #f8f5f1;
  font-size: 14px;
  font-weight: 680;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  box-shadow: -4px -4px 8px rgba(255,255,255,0.28), 7px 7px 12px rgba(107,115,120,0.4);
  transition: transform 120ms ease, filter 180ms ease;
}

.book-btn:active {
  transform: scale(0.98);
  filter: brightness(1.08);
}

.bottom {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 7px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 99px;
  background: rgba(114, 122, 124, 0.4);
  transition: 250ms ease;
}

.dot.active {
  width: 22px;
  background: #51595d;
}

.hint {
  text-align: center;
  color: var(--muted-slate);
  font-size: 12px;
  letter-spacing: 0.03em;
  padding-bottom: 2px;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: calc(var(--safe-b) + 24px);
  transform: translateX(-50%) translateY(16px) scale(0.98);
  opacity: 0;
  pointer-events: none;
  z-index: 30;
  max-width: min(92vw, 430px);
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.35;
  color: var(--graphite);
  background: linear-gradient(145deg, rgba(251, 248, 243, 0.98), rgba(235, 228, 217, 0.9));
  box-shadow:
    -6px -6px 12px rgba(255, 255, 255, 0.9),
    8px 8px 15px rgba(122, 129, 133, 0.3),
    inset -2px -2px 4px rgba(255, 255, 255, 0.65),
    inset 2px 2px 4px rgba(136, 143, 148, 0.16);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: opacity 280ms ease, transform 280ms ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
}
</style>
</head>
<body>
  <main class="app" aria-live="polite">
    <header class="top">
      <div class="brand">
        <p class="brand-tag" id="brandTag">Price List</p>
        <h1 class="brand-title" id="brandTitle">S3VEN STARS</h1>
      </div>
      <div class="lang-toggle" id="langToggle" aria-label="Language switch"></div>
    </header>

    <section class="viewport" id="viewport" aria-label="Package slider">
      <div class="track" id="track"></div>
    </section>

    <div class="bottom" id="dots"></div>
    <p class="hint" id="hint"></p>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const DATA = {
  ru: {
    ui: {
      tag: "Price List",
      featured: "Рекомендуемый",
      bookNow: "Забронировать",
      swipeHint: "Свайпайте, чтобы посмотреть пакеты",
      bookingTemplate: "Hello! I want to book the {name} session.",
      copiedToast: "Текст скопирован. Вставьте его в Директ."
    },
    pkgs: [
      {
        tier: "Quick Session · 01",
        name: "Il Momento",
        slogan: "1 час. Одна история. Двадцать кадров.",
        fields: { dur: "1 час", photos: "15–20 фото", delivery: "48 ч", price: "€180–280" },
        note: "базовая цена",
        features: ["Портреты · Личный бренд · Питомцы", "Приватная галерея", "Подходит для первого знакомства"],
        feat: false
      },
      {
        tier: "Deep Dive · 02",
        name: "Il Racconto",
        slogan: "Полная editorial-сессия.",
        fields: { dur: "3–4 часа", locations: "1–2 локации", photos: "40–60 фото", delivery: "72 ч", extra: "BTS-клип", price: "€450–700" },
        note: "рекомендуемый пакет",
        features: ["Блогеры · Инфлюенсеры · Личный бренд", "BTS-клип для Stories в подарок", "Несколько локаций и образов"],
        feat: true
      },
      {
        tier: "Fashion & Brand · 03",
        name: "La Campagna",
        slogan: "Кампания, а не просто фотосессия.",
        fields: { dur: "Полдня / день", photos: "80–120 фото", rights: "Права на 1 год", price: "€900–1800" },
        note: "включая art direction",
        features: ["Бренды · Бутики · Журналы", "Art direction включён", "Коммерческие права в подарок", "Локации — мой выбор"],
        feat: false
      }
    ]
  },
  en: {
    ui: {
      tag: "Price List",
      featured: "Featured",
      bookNow: "Book Now",
      swipeHint: "Swipe to explore packages",
      bookingTemplate: "Hello! I want to book the {name} session.",
      copiedToast: "Text copied. Paste it into Direct."
    },
    pkgs: [
      {
        tier: "Quick Session · 01",
        name: "Il Momento",
        slogan: "One hour. One story. Twenty frames.",
        fields: { dur: "1 hour", photos: "15–20 photos", delivery: "48h delivery", price: "€180–280" },
        note: "base rate",
        features: ["Portraits · Personal brand · Pets", "Private gallery delivered", "Perfect for a first session"],
        feat: false
      },
      {
        tier: "Deep Dive · 02",
        name: "Il Racconto",
        slogan: "A full editorial session.",
        fields: { dur: "3–4 hours", locations: "1–2 locations", photos: "40–60 photos", delivery: "72h delivery", extra: "BTS clip included", price: "€450–700" },
        note: "most popular",
        features: ["Bloggers · Influencers · Personal brand", "Behind-the-scenes clip for Stories", "Multiple locations & looks"],
        feat: true
      },
      {
        tier: "Fashion & Brand · 03",
        name: "La Campagna",
        slogan: "A campaign, not just photos.",
        fields: { dur: "Half-day / full day", photos: "80–120 photos", rights: "1-year commercial rights", price: "€900–1800" },
        note: "art direction included",
        features: ["Brands · Boutiques · Magazines", "Art direction included", "Commercial usage rights", "Location scouting by me"],
        feat: false
      }
    ]
  },
  it: {
    ui: {
      tag: "Listino Prezzi",
      featured: "Consigliato",
      bookNow: "Prenota Ora",
      swipeHint: "Scorri per vedere i pacchetti",
      bookingTemplate: "Hello! I want to book the {name} session.",
      copiedToast: "Testo copiato. Incollalo in Direct."
    },
    pkgs: [
      {
        tier: "Quick Session · 01",
        name: "Il Momento",
        slogan: "Un'ora. Una storia. Venti scatti.",
        fields: { dur: "1 ora", photos: "15–20 foto", delivery: "48 ore", price: "€180–280" },
        note: "tariffa base",
        features: ["Ritratti · Personal brand · Animali", "Galleria privata inclusa", "Perfetto per la prima sessione"],
        feat: false
      },
      {
        tier: "Deep Dive · 02",
        name: "Il Racconto",
        slogan: "Una sessione editoriale completa.",
        fields: { dur: "3–4 ore", locations: "1–2 location", photos: "40–60 foto", delivery: "72 ore", extra: "BTS clip incluso", price: "€450–700" },
        note: "pacchetto consigliato",
        features: ["Blogger · Influencer · Personal brand", "Clip dietro le quinte per le Stories", "Più location e outfit"],
        feat: true
      },
      {
        tier: "Fashion & Brand · 03",
        name: "La Campagna",
        slogan: "Una campagna, non solo foto.",
        fields: { dur: "Mezza giornata / intera", photos: "80–120 foto", rights: "Diritti commerciali 1 anno", price: "€900–1800" },
        note: "art direction inclusa",
        features: ["Brand · Boutique · Riviste", "Art direction inclusa", "Diritti commerciali in regalo", "Scelta location da me"],
        feat: false
      }
    ]
  }
};

const LANGS = ["en", "ru", "it"];
const LANG_LABELS = { en: "EN", ru: "RU", it: "IT" };
let currentLang = detectLanguage();
let currentPackage = 0;
let toastTimer = null;

function detectLanguage() {
  const nav = (navigator.language || "").toLowerCase();
  if (nav.startsWith("it")) return "it";
  if (nav.startsWith("ru")) return "ru";
  return "en";
}

function buildLanguageToggle() {
  const holder = document.getElementById("langToggle");
  holder.innerHTML = LANGS.map((lang) =>
    `<button class="lang-btn${lang === currentLang ? " active" : ""}" data-lang="${lang}" aria-label="${lang}">${LANG_LABELS[lang]}</button>`
  ).join("");
  holder.querySelectorAll(".lang-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      currentLang = btn.dataset.lang;
      currentPackage = 0;
      render();
    });
  });
}

function buildCards() {
  const langData = DATA[currentLang];
  const track = document.getElementById("track");
  track.innerHTML = langData.pkgs.map((pkg, idx) => {
    const details = Object.entries(pkg.fields)
      .filter(([key]) => key !== "price")
      .map(([, value]) => `<span class="pill">${escapeHtml(value)}</span>`)
      .join("");

    const features = pkg.features.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
    const featured = pkg.feat ? `<span class="featured-chip">${escapeHtml(langData.ui.featured)}</span>` : "";
    return `
      <article class="card">
        <div class="head-row">
          <div>
            <p class="tier">${escapeHtml(pkg.tier)}</p>
            <h2 class="name">${escapeHtml(pkg.name)}</h2>
          </div>
          ${featured}
        </div>
        <p class="slogan">${escapeHtml(pkg.slogan)}</p>
        <div class="price-block">
          <p class="price">${escapeHtml(pkg.fields.price)}</p>
          <p class="note">${escapeHtml(pkg.note)}</p>
        </div>
        <div class="meta">${details}</div>
        <ul class="features">${features}</ul>
        <button class="book-btn" data-idx="${idx}">${escapeHtml(langData.ui.bookNow)}</button>
      </article>
    `;
  }).join("");

  track.querySelectorAll(".book-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const pkg = langData.pkgs[Number(btn.dataset.idx)];
      const text = langData.ui.bookingTemplate.replace("{name}", pkg.name);
      await copyBookingText(text);
      showToast(langData.ui.copiedToast);
      setTimeout(() => {
        window.location.href = "https://www.instagram.com/s3ven_stars/";
      }, 1500);
    });
  });
}

function updateTopCopy() {
  document.documentElement.lang = currentLang;
  document.getElementById("brandTag").textContent = DATA[currentLang].ui.tag;
  document.getElementById("hint").textContent = DATA[currentLang].ui.swipeHint;
}

function buildDots() {
  const dots = document.getElementById("dots");
  dots.innerHTML = DATA[currentLang].pkgs.map((_, i) =>
    `<button class="dot${i === currentPackage ? " active" : ""}" data-dot="${i}" aria-label="Go to package ${i + 1}"></button>`
  ).join("");
  dots.querySelectorAll(".dot").forEach((dot) => {
    dot.addEventListener("click", () => goToPackage(Number(dot.dataset.dot)));
  });
}

function goToPackage(index, animated = true) {
  const max = DATA[currentLang].pkgs.length - 1;
  currentPackage = Math.max(0, Math.min(index, max));
  const track = document.getElementById("track");
  track.style.transition = animated ? "transform 420ms cubic-bezier(0.22, 0.78, 0.2, 1)" : "none";
  track.style.transform = `translateX(${-currentPackage * 100}%)`;
  document.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === currentPackage));
}

function render() {
  buildLanguageToggle();
  updateTopCopy();
  buildCards();
  buildDots();
  goToPackage(currentPackage, false);
}

function escapeHtml(value) {
  return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function copyBookingText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return;
    }
  } catch (_) {
    // Fallback below.
  }

  const helper = document.createElement("textarea");
  helper.value = text;
  helper.setAttribute("readonly", "");
  helper.style.position = "fixed";
  helper.style.left = "-9999px";
  document.body.appendChild(helper);
  helper.select();
  document.execCommand("copy");
  document.body.removeChild(helper);
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1400);
}

// Touch swipe logic for package carousel.
function setupSwipe() {
  const viewport = document.getElementById("viewport");
  const track = document.getElementById("track");
  let startX = 0;
  let startY = 0;
  let startTime = 0;
  let dragging = false;
  let axis = "";

  viewport.addEventListener("touchstart", (event) => {
    const touch = event.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    startTime = Date.now();
    dragging = false;
    axis = "";
  }, { passive: true });

  viewport.addEventListener("touchmove", (event) => {
    const touch = event.touches[0];
    const deltaX = touch.clientX - startX;
    const deltaY = touch.clientY - startY;
    if (!axis) axis = Math.abs(deltaX) > Math.abs(deltaY) ? "x" : "y";
    if (axis !== "x") return;
    dragging = true;
    const base = -currentPackage * viewport.clientWidth;
    track.style.transition = "none";
    track.style.transform = `translateX(${base + deltaX}px)`;
  }, { passive: true });

  viewport.addEventListener("touchend", (event) => {
    if (!dragging) return;
    const deltaX = event.changedTouches[0].clientX - startX;
    const duration = Date.now() - startTime;
    const fast = duration < 240 && Math.abs(deltaX) > 35;
    const far = Math.abs(deltaX) > viewport.clientWidth * 0.28;
    if ((fast || far) && deltaX < 0) goToPackage(currentPackage + 1);
    else if ((fast || far) && deltaX > 0) goToPackage(currentPackage - 1);
    else goToPackage(currentPackage);
    dragging = false;
  }, { passive: true });
}

setupSwipe();
render();
</script>
</body>
</html>
